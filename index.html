<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Weather — Glossmorphism UI (Animated)</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --card-w: 1100px;
  --glass-weak: rgba(255,255,255,0.06);
  --glass-strong: rgba(255,255,255,0.12);
  --accent: rgba(255, 255, 255, 0.885);
  --muted: rgba(255,255,255,0.75);
  --shadow: 0 10px 30px rgba(7,10,25,0.55);
  --inner-shadow: inset 0 2px 10px rgba(0,0,0,0.35);
  --rounded: 24px;
  --glass-border: rgba(255,255,255,0.12);
}

/* Reset */
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:"Poppins",system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
background-image:url("https://i.pinimg.com/originals/a6/a4/33/a6a43353939263dee8783edfef80e70c.gif") ;-webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;background-size: cover;}
body{display:flex;align-items:center;justify-content:center;padding:36px;overflow:hidden;transition:background .8s ease,filter .6s ease}

/* CLOUD LAYER, RAIN CANVAS, FLASH OVERLAY are behind UI (z-index ordering) */
.cloud-layer {position: absolute; inset: 0; pointer-events: none; z-index: 5; overflow: visible;}
#rainCanvas {position: absolute; inset: 0; pointer-events: none; z-index: 10;}
#flashOverlay {position: absolute; inset: 0; z-index: 30; pointer-events:none; background: rgba(255,255,255,0);}

/* Stage & Card (Glossmorphism) */
.stage{width:100%;max-width:1200px;display:flex;justify-content:center;z-index:40;position:relative}
.card{
  width:100%;
  max-width:var(--card-w);
  border-radius:var(--rounded);
  padding:34px 42px;
  color: #eff8ff;
  position:relative;
  overflow:hidden;
  backdrop-filter: blur(10px) saturate(120%);
  -webkit-backdrop-filter: blur(10px) saturate(120%);
  background: linear-gradient(180deg, rgba(23, 71, 114, 0.204), rgba(97, 170, 195, 0.155));
  border: 1px solid var(--glass-border);
  box-shadow: var(--shadow), var(--inner-shadow);
  transition: transform .25s ease, box-shadow .25s ease;
}

/* glossy highlight strip */
.card::after{
  content: "";
  position: absolute;
  left: -10%;
  right: -10%;
  top: -30%;
  height: 40%;
  transform: rotate(-12deg);
  background: linear-gradient(90deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
  filter: blur(8px);
  pointer-events: none;
  z-index: 1;
}

.card:hover { transform: translateY(-6px); box-shadow: 0 18px 45px rgba(8,12,30,0.6); }

/* Top */
.top{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:24px;position:relative;z-index:2}
.title h1{font-size:36px;margin:0;font-weight:700;color:var(--accent)}
.title p{margin:6px 0 0 0;color:rgba(253, 253, 238, 0.87);font-size:15px;font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}

/* Date-Time */
#dateTime{
  display: none !important;
}

/* Search (glass) */
.search-wrap{display:flex;align-items:center;gap:10px}
.search{
  display:flex;align-items:center;background: linear-gradient(180deg, rgba(161, 187, 206, 0.541), rgba(158, 196, 229, 0.541));
  border-radius:999px;padding:10px 12px;min-width:360px;border:1px solid rgba(255,255,255,0.06);
  box-shadow: inset 0 -1px 0 rgba(0,0,0,0.25);
  transition: box-shadow .2s ease, transform .2s ease;
}
.search:focus-within{box-shadow: 0 10px 30px rgba(5,10,30,0.25); transform: translateY(-2px)}
.search input{background:transparent;border:0;color:rgba(23, 18, 97, 0.808);outline:none;padding:8px 12px;width:100%;font-weight:850;font-size: medium;font-family: Verdana, Geneva, Tahoma, sans-serif;}
.search button{
  background: linear-gradient(180deg,#fbfcff,#e9f2ff); color:#0b1b34;border-radius:12px;padding:8px 14px;border:0;font-weight:700;cursor:pointer;
  box-shadow: 0 4px 12px rgba(11,27,52,0.18);
}

/* gear & sound buttons as glass chips */
.gear, #soundToggle{
  min-width:44px;height:44px;border-radius:12px;background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
  display:grid;place-items:center;border:1px solid rgba(255,255,255,0.06);cursor:pointer;color:var(--accent);
  font-weight:600;
}

/* Main content (kept same layout) */
.main{display:none;grid-template-columns:1fr 420px 260px;gap:28px;align-items:center;padding-top:6px;position:relative;z-index:2}
.big-temp .value{font-size:96px;font-weight:700;color:#ffffff;line-height:0.88}
.desc{margin-top:12px;font-size:18px;color:rgba(255,255,255,0.95)}
.illu{width:240px;height:200px;display:flex;align-items:center;justify-content:center;filter: drop-shadow(0 8px 30px rgba(0,0,0,0.55));}

/* Right column */
.right .item{display:flex;gap:12px;align-items:center;color:rgba(255,255,255,0.95);font-size:15px}

/* Forecast wrap as glass strip */
.forecast-wrap{display:none;margin-top:26px;background: linear-gradient(180deg, rgba(55, 62, 63, 0.168), rgba(53, 59, 62, 0.147));padding:14px;border-radius:16px;display:flex;gap:145px;align-items:center;border:1px solid rgba(255,255,255,0.05)}

/* cloud styles & animation */
.cloud {position:absolute; top:10%; left:-25%; width:260px;height:80px;background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="260" height="80" viewBox="0 0 260 80"><g fill="%23ffffff" fill-opacity="0.88"><ellipse cx="60" cy="45" rx="40" ry="30"/><ellipse cx="95" cy="35" rx="50" ry="28"/><ellipse cx="140" cy="45" rx="38" ry="28"/><ellipse cx="185" cy="50" rx="28" ry="20"/></g></svg>') no-repeat center/contain;filter: blur(1px);opacity:.9;transform-origin:center center}
.cloud.small{width:160px;height:56px;transform: translateY(10px) scale(.7);opacity:.78}
.cloud.large{width:340px;height:110px;transform: translateY(-6px) scale(1.02);opacity:.96}
@keyframes cloudMove{from{transform: translateX(-40vw) translateY(0)} to{transform: translateX(140vw) translateY(0)}}

/* Canvas / overlay z indices kept earlier */
#rainCanvas{z-index:10}
#flashOverlay{z-index:30}

/* Night filter for stronger gloss at night */
.night-filter .card{ background: linear-gradient(180deg, rgba(8,12,28,0.68), rgba(5,8,20,0.62)); border: 1px solid rgba(255,255,255,0.03) }

/* responsive */
@media (max-width:980px){ .search{min-width:220px} .big-temp .value{font-size:64px} .card{padding:20px} }
</style>
</head>
<body>

  <!-- Decorative layers -->
  <div class="cloud-layer" id="cloudLayer" aria-hidden="true"></div>

  <!-- Background sound effects (hidden) -->

  <audio id="sfxRain" loop preload="auto" src="https://cdn.pixabay.com/download/audio/2021/10/06/audio_7a630abd6e.mp3?filename=rain-nature-ambient-110397.mp3"></audio>
  <audio id="sfxThunder" loop preload="auto" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_f7754014b0.mp3?filename=thunder-204612.mp3"></audio>
  <audio id="sfxWind" loop preload="auto" src="https://cdn.pixabay.com/download/audio/2021/09/15/audio_4f72e56543.mp3?filename=wind-blowing-ambient-90879.mp3"></audio>

<script>
/* ============================
   JavaScript (enhanced)
   - kept original UI
   - added voice for day+night
   - weather-based voices
   - background sfx for rain/thunder/wind
   - 7-day forecast generation
   - small bug fixes for template usage
   ============================ */

const API_BASE = "https://lu8d7iaq9i.execute-api.eu-north-1.amazonaws.com/prod/wetherMap?city=";
const cloudLayer = document.getElementById('cloudLayer');
const rainCanvas = document.getElementById('rainCanvas');
const flashOverlay = document.getElementById('flashOverlay');
const soundToggle = document.getElementById('soundToggle');
const cardRoot = document.getElementById('cardRoot');

const cityInput = document.getElementById("cityInput");
const searchBtn = document.getElementById("searchBtn");
const mainSection = document.getElementById("mainSection");
const forecastWrap = document.getElementById("forecastWrap");
const tempValueEl = document.getElementById("tempValue");
const feelsLikeEl = document.getElementById("feelsLike");
const humEl = document.getElementById("hum");
const windEl = document.getElementById("wind");
const mainDescEl = document.getElementById("mainDesc");
const cityNameEl = document.getElementById("cityName");
const dateTimeEl = document.getElementById("dateTime");
const body = document.body;

const sfxRain = document.getElementById('sfxRain');
const sfxThunder = document.getElementById('sfxThunder');
const sfxWind = document.getElementById('sfxWind');

let lightningCount = 0;
let maxLightning = 100;
let soundEnabled = false; // starts OFF as your UI set initially

/* ---------- Date/Time ---------- */
function formatDateTime(){
  const d = new Date();
  const o = {weekday:"long", day:"numeric", month:"long", year:"numeric", hour:"2-digit", minute:"2-digit"};
  return d.toLocaleString(undefined,o);
}

/* ---------- Backgrounds (images) ---------- */
const backgrounds = {
  clear: { day: "https://images.pexels.com/photos/531756/pexels-photo-531756.jpeg", night: "https://images.pexels.com/photos/355465/pexels-photo-355465.jpeg" },
  cloud:  { day: "https://images.pexels.com/photos/158163/clouds-cloudporn-weather-lookup-158163.jpeg", night: "https://snowbrains.com/wp-content/uploads/2022/07/cloudy-scaled.jpg" },
  rain:   { day: "https://images.pexels.com/photos/110874/pexels-photo-110874.jpeg", night: "https://images.pexels.com/photos/110874/pexels-photo-110874.jpeg" },
  storm:  { day: "https://images.pexels.com/photos/1118869/pexels-photo-1118869.jpeg", night: "https://images.pexels.com/photos/1118873/pexels-photo-1118873.jpeg" },
  fog:    { day: "https://i.pinimg.com/1200x/b8/a8/5c/b8a85cb720a2fcfb685ed876868d1139.jpg", night: "https://i.pinimg.com/1200x/03/c7/cf/03c7cfe7a4c529f7e53a9f1e984206e2.jpg" },
  default:{ day: "https://c.pxhere.com/photos/5c/58/mountain_clouds_grey_outdoor_smoke_sierra_forestfire_publicdomain-103587.jpg!d", night: "https://www.wishtv.com/wp-content/uploads/2023/06/canadian-wildfire-smoke-US_AP23158651881791-scaled-e1686167909686.jpg" }
};
function isNightLocal(){ const h = new Date().getHours(); return (h >= 18 || h < 6); }
function setBackgroundImage(weather){
  weather = (weather || "").toLowerCase();
  const night = isNightLocal();
  let key = 'default';
  if (weather.includes('clear')) key = 'clear';
  else if (weather.includes('cloud')) key = 'cloud';
  else if (weather.includes('rain') || weather.includes('drizzle')) key = 'rain';
  else if (weather.includes('storm') || weather.includes('thunder')) key = 'storm';
  else if (weather.includes('mist') || weather.includes('fog') || weather.includes('haze')) key = 'fog';
  const img = (backgrounds[key] && backgrounds[key][night ? 'night' : 'day']) || backgrounds.default.day;
  body.style.backgroundImage = 'url("' + img + '")';
  body.style.backgroundSize = 'cover';
  body.style.backgroundPosition = 'center';
  // night glossy filter
  if (night) body.classList.add('night-filter'); else body.classList.remove('night-filter');
}

/* ---------- Clouds ---------- */
function addCloud(size = 'large', topPercent = 10, duration = 60, delay = 0, leftStart = -30){
  const c = document.createElement('div');
  c.className = 'cloud ' + size;
  c.style.top = (topPercent) + '%';
  c.style.animation = 'cloudMove ' + duration + 's linear ' + delay + 's both';
  c.style.left = leftStart + 'vw';
  c.style.opacity = 0.78 + (Math.random()*0.18);
  cloudLayer.appendChild(c);
  c.addEventListener('animationend', ()=> c.remove());
}
function spawnCloudsForWeather(weather){
  cloudLayer.innerHTML = '';
  weather = (weather || '').toLowerCase();
  if (weather.includes('clear')){
    for(let i=0;i<3;i++) addCloud('small', 8 + i*8, 80 + Math.random()*40, i*6, -40 - i*10);
  } else if (weather.includes('cloud')){
    for(let i=0;i<4;i++) addCloud(i%2? 'large':'small', 10 + i*10, 60 + Math.random()*30, i*4, -50 - i*8);
  } else if (weather.includes('rain') || weather.includes('drizzle')){
    for(let i=0;i<5;i++) addCloud(i%2? 'large':'small', 8 + i*6, 50 + Math.random()*20, i*3, -60 - i*10);
  } else if (weather.includes('storm') || weather.includes('thunder')){
    for(let i=0;i<6;i++) addCloud('large', 5 + i*6, 40 + Math.random()*20, i*2, -80 - i*12);
  } else {
    for(let i=0;i<3;i++) addCloud('small', 12 + i*8, 70 + Math.random()*30, i*5, -40 - i*10);
  }
}

/* ---------- Rain Engine (canvas) ---------- */
class RainEngine {
  constructor(canvas){
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.drops = [];
    this.running = false;
    this.resize();
    window.addEventListener('resize', ()=>this.resize());
  }
  resize(){
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
  }
  start(intensity = 400){
    if (this.running) return;
    this.running = true;
    this.drops = [];
    for(let i=0;i<intensity;i++){
      this.drops.push({ x: Math.random()*this.canvas.width, y: Math.random()*this.canvas.height, len: 10+Math.random()*20, speed: 2+Math.random()*6, opacity: 0.1+Math.random()*0.4 });
    }
    this.animate();
  }
  stop(){
    this.running = false;
    this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
  }
  animate(){
    if(!this.running) return;
    const ctx = this.ctx;
    ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
    ctx.lineWidth = 1;
    for(let d of this.drops){
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x + d.speed*0.8, d.y + d.len);
      ctx.strokeStyle = 'rgba(200,210,255,'+d.opacity+')';
      ctx.stroke();
      d.x += d.speed*0.8;
      d.y += d.speed + 2;
      if (d.y > this.canvas.height + 20 || d.x > this.canvas.width + 20){
        d.x = Math.random() * this.canvas.width * 0.4;
        d.y = -20 - Math.random()*200;
      }
    }
    requestAnimationFrame(()=>this.animate());
  }
}

/* ---------- Thunder / Lightning (WebAudio + overlay flash) ---------- */
class ThunderEngine {
  constructor(overlay){
    this.overlay = overlay;
    this.audioCtx = null;
    this.masterGain = null;
    this.scheduled = [];
  }
  initAudio(){
    if (this.audioCtx) return;
    try {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      this.audioCtx = new AudioContext();
      this.masterGain = this.audioCtx.createGain();
      this.masterGain.gain.value = 0.0;
      this.masterGain.connect(this.audioCtx.destination);
    } catch(e){ console.warn('Audio init failed', e); }
  }
  playThunder(duration = 1200){
    if(!this.audioCtx) return;
    const ctx = this.audioCtx;
    const bufferSize = ctx.sampleRate * 1.5;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * Math.exp(-i/bufferSize*4);
    const noise = ctx.createBufferSource(); noise.buffer = buffer;
    const low = ctx.createBiquadFilter(); low.type = "lowpass"; low.frequency.setValueAtTime(200, ctx.currentTime);
    low.frequency.linearRampToValueAtTime(60, ctx.currentTime + duration/2000);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.6, ctx.currentTime + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration/1000);
    noise.connect(low); low.connect(g); g.connect(this.masterGain);
    noise.start();
    const delay = ctx.createDelay(); delay.delayTime.value = 0.2; const feedback = ctx.createGain(); feedback.gain.value = 0.25;
    low.connect(delay); delay.connect(feedback); feedback.connect(delay); delay.connect(this.masterGain);
    this.masterGain.gain.cancelScheduledValues(ctx.currentTime);
    this.masterGain.gain.setValueAtTime(0.8, ctx.currentTime);
    this.masterGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration/1000 + 0.2);
    noise.stop(ctx.currentTime + duration/1000 + 0.1);
  }
  flash(intensity = 0.9, duration = 120){
    const el = this.overlay;
    el.style.transition = 'background ' + (duration/1000) + 's ease';
    el.style.background = 'rgba(255,255,255,'+intensity+')';
    setTimeout(()=>{ el.style.transition = 'background ' + (duration/700) + 's ease'; el.style.background = 'rgba(255,255,255,0)'; }, duration);
  }
  scheduleLightning(totalCount = 20, windowMs = 30000){
    this.clearScheduled();
    for(let i=0;i<totalCount;i++){
      const t = Math.random()*windowMs;
      const timeoutId = setTimeout(()=>{
        if (lightningCount >= maxLightning) return;
        lightningCount++;
        const intensity = 0.4 + Math.random()*0.6;
        const dur = 80 + Math.random()*220;
        this.flash(intensity, dur);
        if (soundEnabled) { this.initAudio(); this.playThunder(600 + Math.random()*1200); }
      }, t);
      this.scheduled.push(timeoutId);
    }
  }
  clearScheduled(){ for(const t of this.scheduled) clearTimeout(t); this.scheduled = []; }
}

/* ---------- Speak (day+night) & weather voices ---------- */
let preferredVoice = null;
function choosePreferredVoice(){
  const voices = speechSynthesis.getVoices();
  // pick an English voice or fallback to first voice
  preferredVoice = voices.find(v => v.lang && v.lang.startsWith('en')) || voices[0] || null;
}
speechSynthesis.onvoiceschanged = choosePreferredVoice;
choosePreferredVoice();

function speakWeather(text, weatherType = 'default'){
  if (!soundEnabled) return;
  if (!('speechSynthesis' in window)) return;

  // stop currently playing speech
  window.speechSynthesis.cancel();
  const ut = new SpeechSynthesisUtterance(text);

  // voice selection
  if (preferredVoice) ut.voice = preferredVoice;
  ut.lang = navigator.language || 'en-US';

  // adjust tone by weather
  switch(weatherType){
    case 'rain':
      ut.rate = 0.95; ut.pitch = 0.9;
      break;
    case 'thunder':
      ut.rate = 0.9; ut.pitch = 0.75;
      break;
    case 'wind':
      ut.rate = 1.05; ut.pitch = 1.2;
      break;
    default:
      ut.rate = 1; ut.pitch = 1;
  }

  window.speechSynthesis.speak(ut);
}

/* ---------- Play / Stop SFX by weather ---------- */
function stopAllSfx(){
  try { sfxRain.pause(); sfxRain.currentTime = 0; } catch(e){}
  try { sfxThunder.pause(); sfxThunder.currentTime = 0; } catch(e){}
  try { sfxWind.pause(); sfxWind.currentTime = 0; } catch(e){}
}
function playSfxForWeather(weather){
  stopAllSfx();
  if (!soundEnabled) return;
  weather = (weather || '').toLowerCase();
  if (weather.includes('rain') || weather.includes('drizzle')) {
    sfxRain.play().catch(()=>{ /* play might be blocked until user gesture */ });
  } else if (weather.includes('storm') || weather.includes('thunder')) {
    sfxThunder.play().catch(()=>{});
  } else if (weather.includes('wind') || weather.includes('breeze')) {
    sfxWind.play().catch(()=>{});
  }
}

/* ---------- Utilities & icons ---------- */
function iconFor(desc){
  desc = (desc||"").toLowerCase();
  if(desc.includes("clear")) return "https://cdn-icons-png.flaticon.com/512/869/869869.png";
  if(desc.includes("cloud")) return "https://cdn-icons-png.flaticon.com/512/414/414825.png";
  if(desc.includes("rain")) return "https://cdn-icons-png.flaticon.com/512/1163/1163624.png";
  if(desc.includes("storm")) return "https://cdn-icons-png.flaticon.com/512/1146/1146858.png";
  if(desc.includes("fog")||desc.includes("haze")) return "https://cdn-icons-png.flaticon.com/512/1779/1779940.png";
  return "https://cdn-icons-png.flaticon.com/512/2930/2930058.png";
}

/* ---------- Forecast: generate 7-day (was 5) ---------- */
function genForecast(currentTemp, desc){
  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const base = new Date();
  return [...Array(7)].map((_,i)=>{
    const d = new Date(base); d.setDate(base.getDate()+i);
    return { name: days[d.getDay()], max: currentTemp + Math.floor(Math.random()*4), min: currentTemp - Math.floor(Math.random()*3), desc: desc };
  });
}

/* ---------- Instances ---------- */
let rainEngineInstance = new RainEngine(rainCanvas);
let thunderInstance = new ThunderEngine(flashOverlay);

/* ---------- Main visuals control ---------- */
function setWeatherVisuals(weather){
  setBackgroundImage(weather);
  spawnCloudsForWeather(weather);

  const isRain = /rain|drizzle/i.test(weather);
  const isStorm = /storm|thunder/i.test(weather);
  const isWind = /wind|breeze/i.test(weather);

  if (isRain || isStorm) rainEngineInstance.start(isStorm ? 900 : 450); else rainEngineInstance.stop();

  if (isStorm){
    const remaining = Math.max(1, maxLightning - lightningCount);
    const total = Math.min(remaining, 100);
    thunderInstance.clearScheduled();
    thunderInstance.scheduleLightning(total, 45000);
  } else {
    thunderInstance.clearScheduled();
  }

  // play SFX if sound enabled
  playSfxForWeather(weather);

  // speak the weather both day and night (previously only night)
  // choose appropriate voiceType for tone
  let voiceType = 'default';
  if (isRain) voiceType = 'rain';
  if (isStorm) voiceType = 'thunder';
  if (isWind) voiceType = 'wind';

  // Compose a succinct report
  if (soundEnabled) {
    const hour = new Date().getHours();
    const greet = (hour >= 5 && hour < 12) ? 'Good morning' : (hour >= 12 && hour < 18) ? 'Good afternoon' : 'Good evening';
    // Speak report
    speakWeather(`${greet}. The weather is ${weather}.`, voiceType);
  }
}

/* ---------- Fetch & update UI ---------- */
async function fetchCity(city){
  try{
    cityNameEl.textContent = "Loading...";
    dateTimeEl.textContent = "";

    const res = await fetch(API_BASE + encodeURIComponent(city));
    const json = await res.json();

    if(!json.success){
      cityNameEl.textContent = "City not found";
      mainSection.style.display = "none";
      forecastWrap.style.display = "none";
      rainEngineInstance.stop();
      thunderInstance.clearScheduled();
      stopAllSfx();
      return;
    }

    cityNameEl.textContent = json.city;
    dateTimeEl.textContent = formatDateTime();

    tempValueEl.textContent = Math.round(json.temperature);
    mainDescEl.textContent = json.weather;
    feelsLikeEl.textContent = "Feels like " + Math.round(json.temperature) + "°C";
    humEl.textContent = "Humidity: " + json.humidity + "%";
    windEl.textContent = "Wind: " + json.wind_speed + " km/h";

    mainSection.style.display = "grid";
    forecastWrap.style.display = "flex";

    const forecast = genForecast(Math.round(json.temperature), json.weather);
    forecastWrap.innerHTML = "";
    forecast.forEach(f=>{
      forecastWrap.innerHTML += `
        <div class="day" style="text-align:center;min-width:80px;color:rgba(255,255,255,0.9)">
          <div class="day-name" style="font-weight:700">${f.name}</div>
          <img class="f-icon" src="${iconFor(f.desc)}" width="42" style="margin:8px 0">
          <div class="temp-range" style="font-size:14px">${f.max}° – ${f.min}°</div>
          <div class="sub" style="font-size:12px;color:rgba(255,255,255,0.7)">${f.desc}</div>
        </div>
      `;
    });

    setWeatherVisuals(json.weather);

    const illu = document.querySelector(".illu svg");
    illu.classList.remove("cloudy");
    if(json.weather.toLowerCase().includes("cloud")) illu.classList.add("cloudy");

    const sunMoon = document.getElementById("sunMoon");
    const moonMask = document.getElementById("moonMask");
    const hour = new Date().getHours();
    if(hour >= 18 || hour < 6){
      sunMoon.setAttribute("fill","#D8C78C");
      moonMask.style.display = "block";
    } else {
      sunMoon.setAttribute("fill","#FFD36A");
      moonMask.style.display = "none";
    }

  }catch(e){
    console.error(e);
    cityNameEl.textContent = "Error";
  }
}

/* ---------- Sound toggle ---------- */
soundToggle.addEventListener('click', async ()=>{
  soundEnabled = !soundEnabled;
  soundToggle.textContent = soundEnabled ? "Sound: ON" : "Sound: OFF";

  // when enabling, resume any suspended audio context used by thunder engine
  if (soundEnabled){
    if (thunderInstance.audioCtx && thunderInstance.audioCtx.state === 'suspended'){
      try { await thunderInstance.audioCtx.resume(); }catch(e){}
    }
    // play SFX for current displayed weather (if any)
    const currentWeather = mainDescEl.textContent || '';
    playSfxForWeather(currentWeather);

    // announce that sound is enabled (day or night)
    speakWeather("Sound enabled", "default");
  } else {
    // stop speech and sfx
    if(window.speechSynthesis) window.speechSynthesis.cancel();
    stopAllSfx();
  }
});

/* ---------- UI events ---------- */
searchBtn.addEventListener("click", ()=>{ if(!cityInput.value.trim()) return alert("Enter a city name"); fetchCity(cityInput.value.trim()); });
cityInput.addEventListener("keydown", e=>{ if(e.key==="Enter") searchBtn.click(); });

/* ---------- Initialize ---------- */
(function init(){
  spawnCloudsForWeather('clear');
  rainCanvas.width = window.innerWidth; rainCanvas.height = window.innerHeight;
  window.addEventListener('resize', ()=> { rainCanvas.width = window.innerWidth; rainCanvas.height = window.innerHeight; });
})();
</script>
